# EEGPT Anxiety Training Configuration
# Mirror of eegpt.yaml but targeting the anxiety dataset (DASPS, 14 channels)

# Training pattern flags
seed: 42
master_port: 51113                # Different port from adhd (51103) and adhd_crown
multitask: true
model_type: 'eegpt'

# Data configuration
data:
  batch_size: 32
  num_workers: 1
  datasets:
    anxiety: 'finetune'           # ← Anxiety dataset instead of adhd
    # ...


# EEGPT-specific model configuration
model:
  # Pretrained weights - each model will load from this checkpoint
  pretrained_path: null

  # Classifier head configuration
  classifier_head:
    head_type: 'avg_pool'  # Options: avg_pool, attention_pool, dual_stream_fusion, flatten_mlp
    
    # Common parameters
    hidden_dims: [128]
    dropout: 0.3
    
    # Attention Pool parameters (for attention_pool)
    attn_n_head: 4
    attn_head_dim: 64
    
    # Dual Stream Fusion parameters (for dual_stream_fusion)
    fusion_mode: 'dual'
    fusion_n_head: 4
    fusion_head_dim: 64
    fusion_use_rope: true
    fusion_rope_theta: 10000.0
    fusion_max_seq_len: 1024

  # EEGPT architecture parameters
  patch_size: 64
  patch_stride: 32
  embed_num: 4
  embed_dim: 512
  depth: 8
  num_heads: 8
  mlp_ratio: 4.0

  # Regularization
  dropout_rate: 0.1
  attn_dropout_rate: 0.1
  drop_path_rate: 0.1

  # Model initialization
  init_std: 0.02
  qkv_bias: true

  # Channel adaptation
  use_channel_conv: false
  conv_chan_dim: 22

  # Classification head settings
  linear_probe1_dim: 16
  linear_probe1_max_norm: 1.0
  linear_probe2_max_norm: 0.25

# Training configuration
training:
  max_epochs: 50
  weight_decay: 0.01
  max_grad_norm: 3.0
    
  # Optimizer settings
  lr_schedule: "onecycle"
  max_lr: 5e-4
  encoder_lr_scale: 0.1
  warmup_epochs: 5
  warmup_scale: 1e-2
  pct_start: 0.2
  min_lr: 1e-6

  # Training options
  freeze_encoder: false
  use_amp: true
  label_smoothing: 0.1

  # LoRA configuration
  lora:
    use_lora: false
    lora_r: 8
    lora_alpha: 16
    lora_dropout: 0.0
    lora_target_modules: ['default']
    lora_exclude_modules: null
    lora_target_type: 'default'
    lora_scope: 'transformer'
    lora_lr_scale: 1.0

# Logging configuration
logging:
  experiment_name: "eegpt_anxiety"
  run_dir: "assets/run"
  
  # Cloud logging configuration
  use_cloud: true
  cloud_backend: "wandb"
  
  project: 'eegpt_anxiety'        # ← Different project name
  entity: null
  api_key: null
  offline: false
  
  tags: ['eegpt', 'anxiety', 'dasps', '14ch']

  log_step_interval: 1
  ckpt_interval: 1